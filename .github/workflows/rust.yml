name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 17 * * FRI'
      timezone: 'America/New_York'
env:
  CARGO_TERM_COLOR: always

permissions:
  checks: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Install dependencies
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get update
        sudo apt-get install libegl-mesa0 libgtk-4-dev libgtk-3-dev libatk1.0-dev --yes
    - uses: actions/checkout@v4
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build --locked --verbose
    - name: Run tests
      if: ${{ matrix.os != 'ubuntu-latest' }}
      run: cargo test --verbose
    - name: Clippy Action
      uses: auguwu/clippy-action@1.5.0
      with:
        token: ${{secrets.GITHUB_TOKEN}}
